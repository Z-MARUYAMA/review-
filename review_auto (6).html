<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>口コミアンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0f0f0f;color:#fff;font-family:'Noto Sans JP',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;}
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.screen{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:420px;animation:fadeIn 0.4s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.error-msg{font-size:14px;color:#888;line-height:2;}
.brand-name{font-size:32px;font-weight:500;letter-spacing:6px;color:#fff;margin-bottom:0.5rem;}
.brand-line{width:40px;height:1px;background:#c9a84c;margin:8px auto 6px;}
.brand-sub{font-size:10px;letter-spacing:4px;color:#888;margin-bottom:2rem;}
.logo-img{width:160px;margin-bottom:0.5rem;filter:invert(1);}
.greeting{font-size:14px;line-height:2;color:#aaa;margin-bottom:2rem;}
.section-title{font-size:12px;letter-spacing:3px;color:#888;margin-bottom:1.25rem;font-weight:500;}
.stars{display:flex;gap:8px;margin-bottom:0.75rem;}
.star{font-size:44px;cursor:pointer;color:#2a2a2a;transition:color 0.15s,transform 0.1s;user-select:none;line-height:1;}
.star.active{color:#c9a84c;}
.star:hover{transform:scale(1.1);}
.rating-label{font-size:13px;color:#888;min-height:20px;margin-bottom:1.5rem;letter-spacing:1px;}
.btn{width:100%;max-width:280px;padding:14px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:0.75rem;}
.btn-primary{background:#fff;color:#0f0f0f;}
.btn-primary:hover{background:#ddd;}
.btn-primary:disabled{background:#333;color:#666;cursor:not-allowed;}
.btn-outline{background:transparent;color:#fff;border:1px solid #fff;}
.btn-outline:hover{background:#1a1a1a;}
.btn-copy{background:transparent;color:#c9a84c;border:1px solid #c9a84c;font-size:13px;padding:0.5rem 1.2rem;margin-bottom:0.5rem;}
.btn-copy:hover{background:#1a1500;}
.btn-copy.copied{background:#c9a84c;color:#000;}
.skip{font-size:12px;color:#888;cursor:pointer;margin-top:1.25rem;text-decoration:underline;text-underline-offset:3px;}
textarea{width:100%;min-height:120px;border:1px solid #2a2a2a;padding:14px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:400;color:#fff;background:#1a1a1a;resize:none;outline:none;line-height:1.8;margin-bottom:0.5rem;transition:border-color 0.2s;}
textarea:focus{border-color:#c9a84c;}
textarea::placeholder{color:#555;}
.thank-icon{font-size:48px;margin-bottom:1rem;}
.thank-title{font-size:22px;font-weight:500;letter-spacing:4px;margin-bottom:1rem;}
.thank-msg{font-size:13px;color:#aaa;line-height:2;margin-bottom:2rem;max-width:280px;}
.divider{width:1px;height:40px;background:#c9a84c;margin:0 auto 2rem;}
</style>
</head>
<body>
<div class="app">

<!-- エラー画面 -->
<div id="s-error" class="screen">
  <div class="error-msg">店舗が見つかりませんでした。<br>URLをご確認ください。</div>
</div>

<!-- 星評価 -->
<div id="s1" class="screen">
  <div id="brand1"></div>
  <p class="greeting">本日はご来店いただき<br>誠にありがとうございます。<br>当店の総合評価をお聞かせください。</p>
  <div class="section-title">総合評価</div>
  <div class="stars" id="stars">
    <span class="star" data-v="1">★</span>
    <span class="star" data-v="2">★</span>
    <span class="star" data-v="3">★</span>
    <span class="star" data-v="4">★</span>
    <span class="star" data-v="5">★</span>
  </div>
  <div class="rating-label" id="ratingLabel"></div>
  <button class="btn btn-primary" id="btn1" disabled>次　へ</button>
</div>

<!-- コメント -->
<div id="s2" class="screen">
  <div id="brand2"></div>
  <div class="section-title" style="margin-top:1.5rem;">ご意見・ご感想</div>
  <p class="greeting" style="margin-bottom:1rem;">料理・サービス・雰囲気など<br>何でもお気軽にお書きください。</p>
  <textarea id="comment" placeholder="例：料理がとても美味しかったです！"></textarea>
  <button class="btn btn-copy" id="btnCopy">📋 コメントをコピー</button>
  <button class="btn btn-primary" id="btn2">次　へ</button>
  <span class="skip" id="skip2">スキップ</span>
</div>

<!-- QRコード -->
<div id="s3" class="screen">
  <div id="brand3"></div>
  <p class="greeting" style="margin-top:1.5rem;">よろしければ、Googleマップにも<br>口コミを投稿いただけますか？</p>
  <a id="googleBtn" href="#" target="_blank" class="btn btn-primary" style="margin-top:1.5rem;text-decoration:none;display:inline-block;">⭐ Googleで口コミを書く</a>
  <span class="skip" id="skip3">またの機会に</span>
</div>

<!-- お礼 -->
<div id="s4" class="screen">
  <div class="thank-icon">🙏</div>
  <div class="thank-title">Thank You</div>
  <div class="divider"></div>
  <p class="thank-msg">ご協力いただき誠にありがとうございます。<br>またのご来店を心よりお待ちしております。</p>
  <div id="brand4"></div>
  <button class="btn btn-outline" id="btnRestart" style="margin-top:2rem;">もう一度</button>
</div>

</div>

const SHOPS = {
  womb:      { name:'WOMB',       sub:'RESTAURANT', url:'https://maps.app.goo.gl/c9MB4AQnKPiAb4xc9', logo:true  },
  zmaruyama: { name:'Z MARUYAMA', sub:'RESTAURANT', url:'https://maps.app.goo.gl/i3bNs7kSdAyfsFeC7', logo:'zmaruyama' },
  bliss:     { name:'BLISS',      sub:'RESTAURANT', url:'https://maps.app.goo.gl/YDmm25SaY8azzPyi9', logo:'bliss' },
  ikra:      { name:'ikra',       sub:'RESTAURANT', url:'https://maps.app.goo.gl/JDwC9Ak9PGMVDstY9', logo:false }
};

// 言語検出（日本語以外は英語）
const isJa = (navigator.language || navigator.userLanguage || 'ja').startsWith('ja');

const T = {
  greeting1:   isJa ? '本日はご来店いただき<br>誠にありがとうございます。<br>当店の総合評価をお聞かせください。'
                    : 'Thank you for visiting us today.<br>Please rate your overall experience.',
  ratingTitle: isJa ? '総合評価' : 'Overall Rating',
  btn1:        isJa ? '次　へ' : 'Next',
  commentTitle:isJa ? 'ご意見・ご感想' : 'Your Comments',
  greeting2:   isJa ? '料理・サービス・雰囲気など<br>何でもお気軽にお書きください。'
                    : 'Feel free to share your thoughts<br>on food, service, atmosphere, etc.',
  placeholder: isJa ? '例：料理がとても美味しかったです！' : 'e.g. The food was absolutely delicious!',
  btnCopy:     isJa ? '📋 コメントをコピー' : '📋 Copy Comment',
  btnCopied:   isJa ? '✅ コピーしました！' : '✅ Copied!',
  btn2:        isJa ? '次　へ' : 'Next',
  skip2:       isJa ? 'スキップ' : 'Skip',
  greeting3:   isJa ? 'よろしければ、Googleマップにも<br>口コミを投稿いただけますか？'
                    : 'Would you mind sharing your review<br>on Google Maps as well?',
  qrNote:      isJa ? '' : '',
  skip3:       isJa ? 'またの機会に' : 'Maybe next time',
  googleBtn:   isJa ? '⭐ Googleで口コミを書く' : '⭐ Write a Google Review',
  thankMsg:    isJa ? 'ご協力いただき誠にありがとうございます。<br>またのご来店を心よりお待ちしております。'
                    : 'Thank you so much for your feedback.<br>We look forward to seeing you again!',
  btnRestart:  isJa ? 'もう一度' : 'Start Over',
  alertEmpty:  isJa ? 'コメントを入力してください' : 'Please enter a comment first.',
  alertCopied: isJa ? 'コピーしました！' : 'Copied!',
};

const labels = isJa
  ? ['','とても残念でした','残念でした','普通でした','良かったです','とても良かったです！']
  : ['','Very Disappointing','Disappointing','Average','Good','Excellent!'];

let rating = 0;
let currentShop = null;

function brandHTML(shop) {
  if (shop.logo === true || shop.logo === 'womb') {
    return `<img class="logo-img" src="${WOMB_LOGO}" alt="${shop.name}"><div class="brand-line"></div><div class="brand-sub">${shop.sub}</div>`;
  }
  if (shop.logo === 'zmaruyama') {
    return `<img class="logo-img" src="${ZMARUYAMA_LOGO}" alt="${shop.name}" style="width:200px;"><div class="brand-line"></div><div class="brand-sub">${shop.sub}</div>`;
  }
  if (shop.logo === 'bliss') {
    return `<img class="logo-img" src="${BLISS_LOGO}" alt="${shop.name}" style="width:140px;"><div class="brand-line"></div><div class="brand-sub">${shop.sub}</div>`;
  }
  return `<div class="brand-name">${shop.name}</div><div class="brand-line"></div><div class="brand-sub">${shop.sub}</div>`;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function update() {
  document.querySelectorAll('.star').forEach(st => st.classList.toggle('active', parseInt(st.dataset.v) <= rating));
  document.getElementById('ratingLabel').textContent = labels[rating];
}

// URLパラメータから店舗を自動判別
window.addEventListener('load', () => {
  // テキストを言語に応じて設定
  document.querySelector('#s1 .greeting').innerHTML = T.greeting1;
  document.querySelector('#s1 .section-title').textContent = T.ratingTitle;
  document.getElementById('btn1').textContent = T.btn1;
  document.querySelector('#s2 .section-title').textContent = T.commentTitle;
  document.querySelector('#s2 .greeting').innerHTML = T.greeting2;
  document.getElementById('comment').placeholder = T.placeholder;
  document.getElementById('btnCopy').textContent = T.btnCopy;
  document.getElementById('btn2').textContent = T.btn2;
  document.getElementById('skip2').textContent = T.skip2;
  document.querySelector('#s3 .greeting').innerHTML = T.greeting3;
  document.getElementById('skip3').textContent = T.skip3;
  document.getElementById('googleBtn').textContent = T.googleBtn;
  document.querySelector('.thank-msg').innerHTML = T.thankMsg;
  document.getElementById('btnRestart').textContent = T.btnRestart;

  const params = new URLSearchParams(window.location.search);
  const shopKey = params.get('shop');
  currentShop = SHOPS[shopKey];

  if (!currentShop) { show('s-error'); return; }

  ['brand1','brand2','brand3','brand4'].forEach(id => {
    document.getElementById(id).innerHTML = brandHTML(currentShop);
  });

  document.getElementById('googleBtn').href = currentShop.url;

  show('s1');
});

document.querySelectorAll('.star').forEach(s => {
  s.addEventListener('click', () => {
    rating = parseInt(s.dataset.v);
    update();
    document.getElementById('btn1').disabled = false;
  });
  s.addEventListener('mouseover', () => {
    const v = parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach(st => st.classList.toggle('active', parseInt(st.dataset.v) <= v));
  });
  s.addEventListener('mouseout', () => update());
});

document.getElementById('btn1').addEventListener('click', () => show('s2'));
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxe2VqAtrW47leT3D3e4DTEmkui71H-3vWLW2nhoL39S0fWN1WMEPdKnJtW6NWSC7bgOw/exec';

function sendToSheet() {
  const comment = document.getElementById('comment').value.trim();
  const params = new URLSearchParams({
    shop: currentShop.name,
    rating: rating,
    comment: comment
  });
  fetch(SHEET_URL + '?' + params.toString(), {
    method: 'GET',
    mode: 'no-cors'
  }).catch(() => {});
}

document.getElementById('btn2').addEventListener('click', () => { sendToSheet(); show('s3'); });
document.getElementById('skip2').addEventListener('click', () => { sendToSheet(); show('s3'); });
document.getElementById('btnCopy').addEventListener('click', () => {
  const text = document.getElementById('comment').value.trim();
  if (!text) { alert(T.alertEmpty); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = T.btnCopied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = T.btnCopy; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.getElementById('comment');
    ta.select(); document.execCommand('copy');
    alert(T.alertCopied);
  });
});
document.getElementById('skip3').addEventListener('click', () => show('s4'));
document.getElementById('btnRestart').addEventListener('click', () => {
  rating = 0;
  update();
  document.getElementById('btn1').disabled = true;
  document.getElementById('comment').value = '';
  show('s1');
});
</script>
</body>
